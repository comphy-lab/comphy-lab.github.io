---
layout: default
---

<main class="teaching-page teaching-page--course" id="course-top">
  <nav class="teaching-breadcrumb" aria-label="Teaching breadcrumb">
    <a href="/teaching/">Teaching</a>
    <span aria-hidden="true">/</span>
    <span>{{ page.title }}</span>
  </nav>

  <header class="teaching-page__head">
    <p class="teaching-page__kicker">
      <span class="rule" aria-hidden="true"></span>
      <span>CoMPhy Lab · Course</span>
      <span class="rule" aria-hidden="true"></span>
    </p>
    <h1 class="teaching-page__title" id="{{ page.title | slugify }}">{{ page.title }}</h1>
    {% if page.description %}
      <p class="teaching-page__lede">{{ page.description }}</p>
    {% endif %}
  </header>

  <article class="teaching-content markdown-content">
    {% capture lazy_img %}<img loading="lazy" decoding="async" onload="this.classList.add('loaded')"{% endcapture %}
    {% assign content_with_lazy = content | replace: '<img', lazy_img %}
    {% capture lazy_iframe %}<div class="video-container"><iframe loading="lazy"{% endcapture %}
    {% assign content_with_video = content_with_lazy | replace: '<iframe', lazy_iframe | replace: '</iframe>', '</iframe></div>' %}
    {{ content_with_video }}
  </article>
</main>
