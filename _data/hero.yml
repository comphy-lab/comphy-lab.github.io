# Homepage hero — rotating above-the-fold visual + PI metadata.
# Fields are read by index.html.

tagline: >-
  We study <em>non-Newtonian free-surface flows</em> and
  <em>soft-matter singularities</em> — bubbles, drops, sheets,
  and jets that break or bounce.

lede: >-
  A small group at the intersection of applied mathematics, fluid
  mechanics, and direct numerical simulation. We develop open-source
  code, train students, and publish with collaborators across Europe
  and North America.

pi:
  name: Vatsal Sanjay
  role: Assistant Professor

