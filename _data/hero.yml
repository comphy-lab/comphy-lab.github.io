# Homepage hero — rotating above-the-fold visual + PI metadata.
# Fields are read by index.html.

tagline: >-
  We study <em>non-Newtonian free-surface flows</em> and
  <em>soft-matter singularities</em>.

lede: >-
  A group working at the intersection of applied mathematics, fluid
  mechanics, and direct numerical simulation. We develop open-source
  codes and theoretical frameworks for soft-matter phenomena across
  multiple length and time scales.

