# Four research themes derived from the real _research/index.md tag
# distribution. Each theme carries a hero figure and the 3 most
# impactful papers introducing it. Used by:
#  - index.html (the .s-themes grid on the homepage)
#  - _layouts/research.html (prepended above the full paper list)

currently:
  label: Currently
  text: >-
    We're studying <b>Herschel–Bulkley bubble-bursting jetting
    transitions</b> and the Ohnesorge-controlled
    <b>respiratory-droplet formation</b> driven by viscoelastic mucus
    rheology. Preprints expected through 2026.

themes:
  - slug: drop-impact
    tag: "Drops"
    num: "01"
    title: "Drop impact & impact forces"
    description: >-
      How drops hit surfaces and what force they leave behind —
      viscosity, rheology, and surface wettability set the regime.
      We unify liquid drops and soft elastic beads into a single
      impact-regime diagram.
    figure: /assets/images/research/drop-impact-prl.png
    papers:
      - year: "2026"
        title: "Impacting spheres: from liquid drops to elastic beads"
        venue: "Soft Matter · Cover"
        href: "/research#23"
      - year: "2025"
        title: "Unifying theory of scaling in drop impact"
        venue: "Phys. Rev. Lett."
        href: "/research#15"
      - year: "2023"
        title: "When does an impacting drop stop bouncing?"
        venue: "J. Fluid Mech."
        href: "/research#11"

  - slug: bubble-bursting
    tag: "Bubbles"
    num: "02"
    title: "Bubble bursting & Worthington jets"
    description: >-
      A surface bubble collapses; the cavity throws a fast, thin jet
      that sometimes breaks into droplets. We map the transition
      across viscosity and elasticity, from Newtonian to viscoplastic
      to elastoviscoplastic media.
    figure: /assets/images/research/NatComm-jet-drop.png
    papers:
      - year: "2025"
        title: "Viscoelastic Worthington Jets and Droplets Produced by Bursting Bubbles"
        venue: "J. Fluid Mech."
        href: "/research#16"
      - year: "2024"
        title: "Bursting bubble in an elastoviscoplastic medium"
        venue: "J. Fluid Mech."
        href: "/research#12"
      - year: "2021"
        title: "Bursting bubble in a viscoplastic medium"
        venue: "J. Fluid Mech."
        href: "/research#7"

  - slug: sheet-dynamics
    tag: "Sheets"
    num: "03"
    title: "Holes & Taylor–Culick retractions"
    description: >-
      A hole in a thin sheet is an interface that runs: rims
      accelerate, then break into droplets. We study the double-
      threshold rupture of draining films, with and without
      surfactant.
    figure: /assets/images/covers/2024-12-JFM_Vol1001.jpeg
    papers:
      - year: "2026"
        title: "Holes in sheets: double-threshold rupture of draining liquid films"
        venue: "Phys. Rev. Lett."
        href: "/research#22"
      - year: "2022"
        title: "Taylor–Culick retractions and the influence of the surroundings"
        venue: "J. Fluid Mech."
        href: "/research#9"
      - year: "2025"
        title: "Focusing of concentric free-surface waves"
        venue: "J. Fluid Mech."
        href: "/research#13"

  - slug: non-newtonian-dns
    tag: "Non-Newtonian"
    num: "04"
    title: "Open-source DNS for complex fluids"
    description: >-
      We extend Basilisk C with non-Newtonian, viscoelastic, and
      elastoviscoplastic solvers, and contribute integral
      surface-tension formulations. Every paper ships with a
      reproducible simulation repository.
    figure: /assets/images/research/S002211202500237X_figAb.png
    papers:
      - year: "2025"
        title: "Integral surface tension formulations in a VOF framework · Marangoni flows"
        venue: "J. Comput. Phys."
        href: "/research#18"
      - year: "2025"
        title: "Electrolyte droplet spraying in H₂ bubbles during water electrolysis"
        venue: "Nat. Commun."
        href: "/research#17"
      - year: "2026"
        title: "Rheology of Two-Dimensional Dilute Emulsions"
        venue: "Phys. Rev. Fluids"
        href: "/research#24"
