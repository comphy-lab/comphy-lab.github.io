# Structured news feed. Homepage shows the 5 most recent entries
# (strict recency, no pin). /news/ (when the archive page lands)
# renders the full list.
#
# Fields per item:
#   date        ISO 8601 (YYYY-MM-DD). Day + month shown on the card.
#   kind        paper | talk | people | move | award
#   title       1-line human title of the event.
#   meta        html-safe sentence. <strong> renders as coral.
#   thumb       optional — image path for kind: paper.
#   avatar      optional initials for kind: people when no photo.
#   action_label + action_href — the right-side button.
#
# Ordered newest → oldest. Update News.md in parallel until the
# markdown archive is deprecated; data here is the homepage
# source of truth.

