name: Rebuild Site on Search Database Update

on:
  push:
    branches: [main]
    paths:
      - "assets/js/search_db.json"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build site and search database
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Package Pages artifact
        run: |
          tar --dereference --hard-dereference -cvf github-pages.tar _site
          gzip -f github-pages.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: github-pages.tar.gz
          retention-days: 1
          compression-level: 0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
